<script>
const info = {
  community: {
    title: "Community rules — managed by Dragos, read-only",
    body: `<ul>
      <li><strong>What they are:</strong> Detection rules written and maintained entirely by Dragos. They cover known ICS adversary techniques, protocol anomalies, and threat behaviours across all supported verticals including Electric Utility.</li>
      <li><strong>Can we edit them?</strong> No. Community rules are read-only. We cannot modify the logic, threshold, or severity of a Community rule.</li>
      <li><strong>Remote vs local:</strong> Rules marked "Remote" run on the Sensor in memory — they watch for multi-threshold patterns before firing. These are the rules that feed composite detection logic.</li>
      <li><strong>How we tune them:</strong> We cannot change the rule itself. The only lever is a Notification Rule — which controls what happens to the alert after it fires (suppress, re-route, change severity).</li>
      <li><strong>Updates:</strong> Community rules are updated via Knowledge Pack deployments pushed by Dragos.</li>
    </ul>`
  },
  kp: {
    title: "Knowledge packs — threat intelligence and content updates",
    body: `<ul>
      <li><strong>What they are:</strong> Bundled updates from Dragos containing new/updated detection rules, threat intelligence, IOCs, and adversary context. Released on a regular cadence.</li>
      <li><strong>Do they reduce false positives?</strong> No. Knowledge packs update detection content only. They do not tune notification routing or suppress existing alerts.</li>
      <li><strong>Adversary coverage:</strong> KPs include context on threat groups like VOLTZITE, ELECTRUM, and CHERNOVITE — particularly relevant for Electric Utility environments. This context appears in detection details to inform analyst triage.</li>
      <li><strong>Do they affect tuning?</strong> No. KPs have nothing to do with Notification Rules. All tuning remains manual.</li>
    </ul>`
  },
  custom: {
    title: "Custom rules — user-created detections",
    body: `<ul>
      <li><strong>Can we create them?</strong> Yes — Dragos allows users to create custom detection rules for environment-specific behaviours that Community rules don't cover.</li>
      <li><strong>When to use them:</strong> Best for highly specific behaviours unique to this client's setup — e.g., a particular asset communicating on an unexpected port that only exists in their environment.</li>
      <li><strong>Important limitation:</strong> Custom rules do not have Dragos threat intelligence backing. Our team owns and maintains them — Dragos will not update or support them.</li>
      <li><strong>Bottom line:</strong> Use sparingly, document thoroughly, and review during quarterly tuning sessions.</li>
    </ul>`
  },
  atomic: {
    title: "Atomic detections — Sev 0–2, fixed severity",
    body: `<ul>
      <li><strong>What they are:</strong> Individual, single-event observations. Each fires independently based on one detected behaviour — a suspicious file transfer, a new device, an unusual protocol command.</li>
      <li><strong>Severity:</strong> Fixed permanently at the level assigned by Dragos. A Sev 2 rule will always fire at Sev 2 — no exceptions, no matter the context.</li>
      <li><strong>Volume:</strong> The vast majority of Dragos alert volume in a new deployment comes from atomic detections. For this Electric Utility client, 80–90% of the 20,000+ alerts are Sev 0–2 atomics.</li>
      <li><strong>Critical rule:</strong> Never suppress atomic detections inside the platform. Only gate their SIEM forwarding. The correlation engine depends on these events to form composite detections.</li>
    </ul>`
  },
  correlation: {
    title: "Correlation engine — the escalation mechanism",
    body: `<ul>
      <li><strong>What it does:</strong> Continuously watches all in-platform atomic events and matches sequences against known ICS adversary tradecraft patterns.</li>
      <li><strong>Visibility:</strong> The engine itself is invisible — you only see its output when a composite detection fires. There is no "correlation engine alert."</li>
      <li><strong>Dependency:</strong> Requires Sev 0–2 atomic events to be present in-platform at all times. If Notification Rules drop those events entirely from the platform, composites will silently stop firing.</li>
      <li><strong>Community rules marked "Remote"</strong> run on the Sensor in memory and feed the multi-threshold logic that drives this engine.</li>
    </ul>`
  },
  composite: {
    title: "Composite detections — Sev 3–5, brand new alert",
    body: `<ul>
      <li><strong>What they are:</strong> Brand-new, separate alerts fired when the correlation engine matches a multi-step adversary pattern. They do not modify the original atomic alerts — they are entirely new events.</li>
      <li><strong>Severity scale:</strong> Sev 3 = high-confidence multi-step behaviour. Sev 4 = highly likely malicious ICS activity. Sev 5 = near-certain active attack.</li>
      <li><strong>For Electric Utility:</strong> Sev 4–5 composites involving DNP3, Modbus, IEC 61850, or GOOSE protocols should be escalated to OT operations immediately — not after investigation.</li>
      <li><strong>These are the alerts that matter most.</strong> The entire tuning effort on Sev 0–2 exists to ensure analysts can focus exclusively on Sev 3–5 in real time.</li>
    </ul>`
  },
  notif: {
    title: "Notification rules — the only tuning mechanism",
    body: `<ul>
      <li><strong>What they control:</strong> Everything that happens after a detection fires — where it goes, what severity it appears at, whether it reaches the SIEM, whether it's suppressed from the analyst queue.</li>
      <li><strong>What they do NOT control:</strong> Whether a detection fires in the first place. You cannot stop Dragos from detecting something — only from showing it or sending it somewhere.</li>
      <li><strong>How they work:</strong> Top-down, first match wins — exactly like a firewall ruleset. Rule order is critical.</li>
      <li><strong>Naming convention:</strong> PURPOSE-SCOPE-CONDITION-ACTION[-TicketRef]. Example: SUPPRESS-GLOBAL-SEV0-NOSIEM or UPGRADE-ZONE-SIS-CRITICALPLC-SEV+2.</li>
      <li><strong>Actions available:</strong> Suppress SIEM forwarding, change severity (up or down), route to a specific syslog destination, drop from analyst queue.</li>
    </ul>`
  },
  siem: {
    title: "SIEM / SOC — Sev 3+ only",
    body: `<ul>
      <li>The recommended Notification Rule pattern routes only Sev 3 and above to the SIEM and SOC analyst queues.</li>
      <li>This is the output analysts monitor in real time. Everything below Sev 3 is reviewed on a scheduled cadence inside the Dragos platform only.</li>
      <li>Sev 5: immediate on-call paging. Sev 4: SOC queue response. Sev 3: investigate within SLA.</li>
      <li>For Electric Utility: Sev 4–5 involving substation assets or protection relays should be escalated to OT operations immediately — during investigation, not after.</li>
    </ul>`
  },
  inplatform: {
    title: "In-platform retention — Sev 0–2",
    body: `<ul>
      <li>Sev 0–2 alerts stay inside Dragos even when SIEM forwarding is suppressed. This is intentional and critical to the composite detection chain.</li>
      <li>The correlation engine reads from in-platform events. If Sev 0–2 are present here, composites can form. If they are dropped entirely, composites will never fire.</li>
      <li>Analysts review in-platform Sev 0–2 on a scheduled cadence (daily or weekly triage sessions) — not in real time.</li>
      <li>Over time, the classify-and-tune cycle progressively reduces in-platform Sev 0–2 volume to only meaningful, unclassified events.</li>
    </ul>`
  },
  suppressed: {
    title: "Suppressed — SIEM forwarding blocked, not deleted",
    body: `<ul>
      <li>"Suppressed" means the alert's external forwarding is blocked — it does not reach the SIEM or analyst dashboard.</li>
      <li>The alert still exists inside the platform. It still feeds the correlation engine. Only its outward visibility is removed.</li>
      <li><strong>This distinction is critical:</strong> suppression = hide from SIEM. It does not mean delete or ignore inside Dragos.</li>
      <li>Only suppress alerts that have been classified — confirmed false positives or confirmed benign true positives (accepted risk). Never suppress unclassified alerts.</li>
    </ul>`
  }
};

function show(key) {
  const d = info[key]; if (!d) return;
  document.getElementById('detail-title').textContent = d.title;
  document.getElementById('detail-body').innerHTML = d.body;
  const panel = document.getElementById('detail-panel');
  panel.classList.add('open');
  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}
</script>
